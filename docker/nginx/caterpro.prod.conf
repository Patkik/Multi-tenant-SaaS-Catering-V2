server {
    listen 80;

    # Regex subdomain capture for tenant (stancl/tenancy style)
    server_name ~^(?<tenant>.+)\.caterpro\.local$ central.local;

    root /var/www/html/public;
    index index.php index.html;

    # Pass tenant id to PHP-FPM
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param TENANT_ID $tenant;
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
    }

    # Static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri $uri/ =404;
    }

    client_max_body_size 50M;
    access_log /dev/stdout;
    error_log /dev/stderr warn;
}
