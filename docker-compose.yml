version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-caterpro_landlord}
      MYSQL_USER: ${MYSQL_USER:-caterpro}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    volumes:
      - ./central-app:/var/www/html:cached
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-caterpro_landlord}
      DB_USERNAME: ${MYSQL_USER:-caterpro}
      DB_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      REDIS_HOST: redis
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: nginx:stable-alpine
    depends_on:
      - app
    volumes:
      - ./central-app:/var/www/html:ro
      - ./docker/nginx/caterpro.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

  frontend-builder:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    volumes:
      - frontend_dist:/dist
    command: ["/bin/sh", "-c", "echo built && sleep infinity"]

volumes:
  db_data:
  redis_data:
  frontend_dist:
